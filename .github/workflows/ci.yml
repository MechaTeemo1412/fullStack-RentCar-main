name: "CI/CD Pipeline RentCar"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analisis-vulnerabilidad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
        continue-on-error: true

      - name: snyk test java 
        continue-on-error: true
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_OPTS: "-Xmx2g"
          MAVEN_OPTS: "-Xmx2g"
        run: snyk test --severity-threshold=high

      - name: generate snyk JSON Report 
        continue-on-error: true
        if: always()
        run: |
          echo "Generando reporte "
          snyk test --json > snyk-report.json || echo "fallo "
          ls -lh snyk-report.json || echo "no se genero el reporte"
      
      - name: upload snyk json report 
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
  
  analisis-sonarcloud:
    runs-on: ubuntu-latest
    needs: analisis-vulnerabilidad 
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: run sonar cloud
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY_SONAR: ${{ secrets.PROJECT_KEY_SONAR }}
          ORGANIZATION_SONAR: ${{ secrets.ORGANIZATION_SONAR }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=${PROJECT_KEY_SONAR} \
            -Dsonar.organization=${ORGANIZATION_SONAR} \
            -Dsonar.token=${SONAR_TOKEN}

  construir-y-subir-docker:
    runs-on: ubuntu-latest
    needs: analisis-sonarcloud
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rentcar:latest