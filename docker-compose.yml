version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rentcar-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=rentcar_db
      - MYSQL_USER=rentcar_user
      - MYSQL_PASSWORD=rentcar_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: ${DOCKERHUB_USERNAME}/rentcar:latest
    container_name: rentcar-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/rentcar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=rentcar_user
      - SPRING_DATASOURCE_PASSWORD=rentcar_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db

volumes:
  db_data: